# Fallback reference sites when WebSearch unavailable
# Organized by archetype × tech-comfort level
# 3-5 sites per cell, high-signal only

calming_trust:
  low_tech:
    familiarity:
      - url: impots.gouv.fr
        why: Used quarterly by all French taxpayers — internalized layout patterns
      - url: ameli.fr
        why: Health insurance portal — trusted institutional visual language
      - url: credit-agricole.fr/app
        why: Most-used banking app in rural France — their daily trust reference
    ceiling:
      - url: doctolib.fr
        why: Successfully adopted by low-tech users — the "best UX they know"
      - url: leboncoin.fr
        why: Mainstream adoption across demographics — familiar marketplace UX
    anti:
      - url: notion.so
        why: Signals "tech tool" — would alienate artisan audience
      - url: linear.app
        why: Developer aesthetic — opposite of institutional trust
    cross_industry:
      - pattern: Doctolib appointment flow
        why: Same emotional job (reduce anxiety about complex process) in healthcare
  medium_tech:
    familiarity:
      - url: doctolib.fr
        why: Regular healthcare booking — comfortable with forms and appointment flows
      - url: leboncoin.fr
        why: Marketplace browsing with filters and messaging — daily pattern
      - url: boursorama.com
        why: Online banking — trusted financial interface for moderate-tech users
    ceiling:
      - url: alan.com
        why: Modern health insurance with clean UX — adopted by mainstream users
      - url: qonto.com
        why: Business banking with calming design — successfully bridges trust + modern
    anti:
      - url: linear.app
        why: Developer-focused density and keyboard-first navigation
    cross_industry:
      - pattern: Alan health dashboard
        why: Calming trust with modern patterns — accessible to mainstream users
  high_tech:
    familiarity:
      - url: stripe.com/dashboard
        why: Daily tool for tech-savvy finance users
      - url: github.com
        why: Familiar interface patterns for developers
    ceiling:
      - url: mercury.com
        why: Premium banking with clean, calming design for tech users
      - url: wise.com
        why: Financial trust with modern UX
    anti:
      - url: impots.gouv.fr
        why: Too basic — would signal lack of sophistication
    cross_industry:
      - pattern: Calm app meditation flow
        why: Anxiety reduction through design — muted palette, generous whitespace

