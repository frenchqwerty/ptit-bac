<!DOCTYPE html>
<html lang="{detected-language}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{Screen Title} — {Subject}</title>
  <style>
    /* === Design System Tokens === */
    :root {
      --bg: #FFFFFF;
      --surface: #F5F5F5;
      --border: #E0E0E0;
      --text: #333333;
      --text-secondary: #666666;
      --accent: #333333;
      --cta: #333333;
      --success: #16A34A;
      --warning: #D97706;
      --error: #DC2626;
      --font: system-ui, -apple-system, sans-serif;
      --radius: 8px;
      --radius-sm: 6px;
    }

    /* === Reset & Base === */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
      min-height: 100vh;
    }

    /* === Layout === */
    .container { max-width: 480px; margin: 0 auto; padding: 0 1rem; }
    .section { padding: 2rem 0; }

    /* === Navigation === */
    nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.75rem 1rem;
      border-bottom: 1px solid var(--border);
      background: var(--bg);
      position: sticky;
      top: 0;
      z-index: 100;
    }
    nav a {
      color: var(--text-secondary);
      text-decoration: none;
      font-size: 0.875rem;
      padding: 0.25rem 0.5rem;
      border-radius: var(--radius-sm);
    }
    nav a.active, nav a:hover { color: var(--accent); font-weight: 600; }

    /* === Components === */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.5rem;
      margin-bottom: 1rem;
    }
    .btn-primary {
      display: inline-block;
      background: var(--cta);
      color: #FFFFFF;
      padding: 0.75rem 1.5rem;
      border: none;
      border-radius: var(--radius-sm);
      font-weight: 600;
      font-size: 1rem;
      cursor: pointer;
      text-align: center;
      width: 100%;
    }
    .btn-primary:hover { opacity: 0.9; }
    .btn-secondary {
      display: inline-block;
      background: transparent;
      color: var(--accent);
      padding: 0.75rem 1.5rem;
      border: 1px solid var(--accent);
      border-radius: var(--radius-sm);
      font-weight: 600;
      font-size: 1rem;
      cursor: pointer;
      text-align: center;
    }
    .upload-zone {
      border: 2px dashed var(--border);
      border-radius: 12px;
      padding: 3rem 1.5rem;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.2s;
    }
    .upload-zone:hover, .upload-zone.dragover { border-color: var(--accent); }
    input[type="text"], input[type="email"], input[type="number"], textarea, select {
      width: 100%;
      padding: 0.75rem;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      font-size: 1rem;
      font-family: var(--font);
    }
    .trust-signal {
      font-size: 0.875rem;
      color: var(--text-secondary);
      text-align: center;
      padding: 0.5rem 0;
    }
    .success-badge {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      color: var(--success);
      font-weight: 600;
    }

    /* === Typography === */
    h1 { font-size: 2rem; font-weight: 700; margin-bottom: 0.5rem; }
    h2 { font-size: 1.5rem; font-weight: 600; margin-bottom: 0.5rem; }
    .text-secondary { color: var(--text-secondary); }
    .text-small { font-size: 0.875rem; }

    /* === Utility === */
    .mt-1 { margin-top: 0.5rem; }
    .mt-2 { margin-top: 1rem; }
    .mt-3 { margin-top: 1.5rem; }
    .mb-2 { margin-bottom: 1rem; }
    .text-center { text-align: center; }
    .flex { display: flex; }
    .gap-1 { gap: 0.5rem; }
    .gap-2 { gap: 1rem; }
    .hidden { display: none; }

    /* === Responsive === */
    @media (min-width: 768px) { .container { max-width: 720px; } }
    @media (min-width: 1024px) { .container { max-width: 960px; } }
  </style>
</head>
<body>
  <!-- Navigation -->
  <nav>
    <strong>{AppName}</strong>
    <div>
      <!-- Links to other screens in the flow -->
    </div>
  </nav>

  <!-- Main Content -->
  <main class="container">
    <!-- Design rationale: HTML comments explaining artifact-driven decisions -->
  </main>

  <!-- Footer -->
  <footer class="container text-center text-secondary text-small" style="padding: 2rem 0;">
    <!-- Adapt to locale/legal requirements -->
  </footer>

  <script>
    // Upload zone drag-and-drop
    document.querySelectorAll('.upload-zone').forEach(zone => {
      zone.addEventListener('dragover', e => { e.preventDefault(); zone.classList.add('dragover'); });
      zone.addEventListener('dragleave', () => zone.classList.remove('dragover'));
      zone.addEventListener('drop', e => { e.preventDefault(); zone.classList.remove('dragover'); });
      zone.addEventListener('click', () => {
        const input = zone.querySelector('input[type="file"]') || document.createElement('input');
        input.type = 'file'; input.click();
      });
    });

    // Tab switching
    document.querySelectorAll('[data-tab]').forEach(tab => {
      tab.addEventListener('click', () => {
        const target = tab.dataset.tab;
        document.querySelectorAll('[data-tab]').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('[data-tab-content]').forEach(c => c.classList.add('hidden'));
        tab.classList.add('active');
        document.querySelector(`[data-tab-content="${target}"]`)?.classList.remove('hidden');
      });
    });
  </script>
</body>
</html>
