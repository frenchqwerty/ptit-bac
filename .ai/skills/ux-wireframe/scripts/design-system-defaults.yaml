colors:
  bw:
    bg: "#FFFFFF"
    surface: "#F5F5F5"
    border: "#E0E0E0"
    text: "#333333"
    text-secondary: "#666666"
    accent: "#333333"
    cta: "#333333"
  clean:
    bg: "#FFFFFF"
    surface: "#F8FAFC"
    border: "#E2E8F0"
    text: "#1E293B"
    text-secondary: "#64748B"
    accent: "#2563EB"
    cta: "#2563EB"
    success: "#16A34A"
    warning: "#D97706"
    error: "#DC2626"
  polished:
    bg: "#FAFBFF"
    surface: "#F0F4FF"
    border: "#C7D2FE"
    text: "#1E293B"
    text-secondary: "#475569"
    accent: "#4F46E5"
    cta: "#4F46E5"
    success: "#059669"
    warning: "#D97706"
    error: "#DC2626"

typography:
  font-family: "system-ui, -apple-system, sans-serif"
  heading-1: "2rem / 700"
  heading-2: "1.5rem / 600"
  body: "1rem / 400"
  small: "0.875rem / 400"
  cta: "1rem / 600"

spacing:
  xs: "0.25rem"
  sm: "0.5rem"
  md: "1rem"
  lg: "1.5rem"
  xl: "2rem"
  section: "3rem"

breakpoints:
  mobile: "375px"
  tablet: "768px"
  desktop: "1024px"

components:
  card: "border-radius: 8px; padding: 1.5rem; border: 1px solid var(--border)"
  button-primary: "padding: 0.75rem 1.5rem; border-radius: 6px; font-weight: 600"
  input: "padding: 0.75rem; border-radius: 6px; border: 1px solid var(--border)"
  upload-zone: "border: 2px dashed var(--border); border-radius: 12px; padding: 3rem; text-align: center"
